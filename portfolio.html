<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio | Marcos Varela</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <header></header>

  <main>
    <section class="portfolio-section">
      <h2><span data-i18n="portfolio.someProjects"></span></h2>
      <p class="portfolio-lead"><span data-i18n="portfolio.someProjectsDesc"></span></p>

      <div class="pf-list">

        <!-- DigReport — v1.0 -->
        <a class="pf-row" href="https://github.com/marcosvarela5/digreport" target="_blank" rel="noopener">
          <div class="pf-img">
            <img src="assets/img/heritagehub.png" alt="DigReport">
          </div>
          <div class="pf-body">
            <div class="pf-header">
              <h3 data-i18n="portfolio.project5Title"></h3>
              <span class="pf-badge pf-badge--v1" data-i18n="portfolio.badges.v1"></span>
            </div>
            <p class="pf-stack" data-i18n="portfolio.project5Stack"></p>
            <p class="pf-desc" data-i18n="portfolio.project5Desc"></p>
          </div>
          <div class="pf-arrow">
            <i class="fab fa-github"></i>
          </div>
        </a>

        <!-- AVC Admin — Beta -->
        <a class="pf-row" href="https://github.com/marcosvarela5/avc-admin" target="_blank" rel="noopener">
          <div class="pf-img">
            <img src="assets/img/avc.png" alt="AVC Admin">
          </div>
          <div class="pf-body">
            <div class="pf-header">
              <h3 data-i18n="portfolio.project7Title"></h3>
              <span class="pf-badge pf-badge--beta-closed" data-i18n="portfolio.badges.betaClosed"></span>
            </div>
            <p class="pf-stack" data-i18n="portfolio.project7Stack"></p>
            <p class="pf-desc" data-i18n="portfolio.project7Desc"></p>
          </div>
          <div class="pf-arrow">
            <i class="fab fa-github"></i>
          </div>
        </a>

        <!-- AIC Members — In development -->
        <a class="pf-row" href="https://github.com/marcosvarela5/AICMembers" target="_blank" rel="noopener">
          <div class="pf-img">
            <img src="assets/img/aic.jpg" alt="AIC Members">
          </div>
          <div class="pf-body">
            <div class="pf-header">
              <h3 data-i18n="portfolio.project6Title"></h3>
              <span class="pf-badge pf-badge--indev" data-i18n="portfolio.badges.indev"></span>
            </div>
            <p class="pf-stack" data-i18n="portfolio.project6Stack"></p>
            <p class="pf-desc" data-i18n="portfolio.project6Desc"></p>
          </div>
          <div class="pf-arrow">
            <i class="fab fa-github"></i>
          </div>
        </a>

        <!-- Portfolio website — v3.0 -->
        <a class="pf-row" href="https://github.com/marcosvarela5/marcosvarela5.github.io" target="_blank" rel="noopener">
          <div class="pf-img">
            <img src="assets/img/portfolio.png" alt="Portfolio Website">
          </div>
          <div class="pf-body">
            <div class="pf-header">
              <h3 data-i18n="portfolio.project1Title"></h3>
              <span class="pf-badge pf-badge--v1">v3.0</span>
            </div>
            <p class="pf-stack" data-i18n="portfolio.project1Stack"></p>
            <p class="pf-desc" data-i18n="portfolio.project1Desc"></p>
          </div>
          <div class="pf-arrow">
            <i class="fab fa-github"></i>
          </div>
        </a>

      </div>

      <!-- Deprecated accordion -->
      <button class="pf-deprecated-toggle" aria-expanded="false" aria-controls="pf-deprecated-list">
        <i class="fas fa-archive" style="font-size:0.75rem;"></i>
        <span data-i18n="portfolio.badges.deprecated"></span> (3)
        <i class="fas fa-chevron-down pf-toggle-icon"></i>
      </button>

      <div class="pf-deprecated-list" id="pf-deprecated-list">

        <!-- Sports Trial Management -->
        <a class="pf-row pf-row--deprecated" href="https://github.com/marcosvarela5/practicaPA" target="_blank" rel="noopener">
          <div class="pf-img">
            <img src="assets/img/sports.png" alt="Sports Trials">
          </div>
          <div class="pf-body">
            <div class="pf-header">
              <h3 data-i18n="portfolio.project2Title"></h3>
              <span class="pf-badge pf-badge--deprecated" data-i18n="portfolio.badges.deprecated"></span>
            </div>
            <p class="pf-stack" data-i18n="portfolio.project2Stack"></p>
            <p class="pf-desc" data-i18n="portfolio.project2Desc"></p>
          </div>
          <div class="pf-arrow">
            <i class="fab fa-github"></i>
          </div>
        </a>

        <!-- Event Management -->
        <a class="pf-row pf-row--deprecated" href="https://github.com/marcosvarela5/practicaMad" target="_blank" rel="noopener">
          <div class="pf-img">
            <img src="assets/img/event.jpg" alt="Event Management">
          </div>
          <div class="pf-body">
            <div class="pf-header">
              <h3 data-i18n="portfolio.project3Title"></h3>
              <span class="pf-badge pf-badge--deprecated" data-i18n="portfolio.badges.deprecated"></span>
            </div>
            <p class="pf-stack" data-i18n="portfolio.project3Stack"></p>
            <p class="pf-desc" data-i18n="portfolio.project3Desc"></p>
          </div>
          <div class="pf-arrow">
            <i class="fab fa-github"></i>
          </div>
        </a>

        <!-- Simple Web Server -->
        <a class="pf-row pf-row--deprecated" href="https://github.com/marcosvarela5/webServerPractice" target="_blank" rel="noopener">
          <div class="pf-img">
            <img src="assets/img/server.png" alt="Web Server">
          </div>
          <div class="pf-body">
            <div class="pf-header">
              <h3 data-i18n="portfolio.project4Title"></h3>
              <span class="pf-badge pf-badge--deprecated" data-i18n="portfolio.badges.deprecated"></span>
            </div>
            <p class="pf-stack" data-i18n="portfolio.project4Stack"></p>
            <p class="pf-desc" data-i18n="portfolio.project4Desc"></p>
          </div>
          <div class="pf-arrow">
            <i class="fab fa-github"></i>
          </div>
        </a>

      </div>
    </section>
  </main>

  <footer></footer>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/scroll-reveal.js"></script>
  <script src="assets/js/menumobile.js"></script>
  <script src="assets/js/lang.js"></script>
  <script src="assets/js/theme.js"></script>

  <script>
    const toggle = document.querySelector('.pf-deprecated-toggle');
    const list   = document.getElementById('pf-deprecated-list');

    toggle.addEventListener('click', function () {
      const open = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !open);
      list.classList.toggle('is-open', !open);
    });
  </script>
</body>

</html>
