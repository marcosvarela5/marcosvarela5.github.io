<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marcos Varela</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header></header>

  <main>
    <section id="home" class="section-home">
      <div class="home-content">
        <div class="home-text">
          <h1>
            <span data-i18n="index.hello"></span>
            <span class="typewriter-target" aria-label="Marcos!"></span>
          </h1>
          <p data-i18n="index.role"></p>
        </div>
        <div class="home-img">
          <img src="assets/img/portada.png" alt="Imagen de portada" />
        </div>
      </div>
    </section>

    <section id="about-me" class="section-about reveal-below">
      <h2 data-i18n="index.aboutTitle"></h2>
      <div class="about-text">
        <p data-i18n="index.about1"></p>
        <p data-i18n="index.about2"></p>
        <p data-i18n="index.about3"></p>
      </div>
      <div class="about-photos">
        <img src="assets/img/happy.png" alt="Imagen de Happy" />
        <img src="assets/img/picindex.jpeg" alt="" />
      </div>
    </section>
  </main>

  <footer></footer>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/scroll-reveal.js"></script>
  <script src="assets/js/typewriter.js"></script>
  <script src="assets/js/menumobile.js"></script>
  <script src="assets/js/lang.js"></script>
  <script src="assets/js/theme.js"></script>
</body>

</html>
