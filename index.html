<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marcos Varela</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header></header>

  <main>
    <section id="home" class="section-home">
      <div class="home-content">
        <div class="home-text">

          <!-- Label above name -->
          <span class="hero-label">Software Engineer</span>

          <h1>
            <span data-i18n="index.hello"></span>
            <span class="typewriter-target" aria-label="Marcos!"></span>
          </h1>

          <!-- Rotating roles -->
          <div class="hero-roles">
            <span class="hero-role-sep"></span>
            <span class="hero-role-text" id="heroRole"></span>
          </div>

          <!-- Stack chips -->
          <div class="hero-stack">
            <span class="hero-chip">C# · .NET</span>
            <span class="hero-chip">Spring Boot</span>
            <span class="hero-chip">SQL Server</span>
            <span class="hero-chip">Vue 3</span>
            <span class="hero-chip">Hexagonal Arch.</span>
          </div>

          <!-- Dual CTA -->
          <div class="hero-ctas">
            <a href="about.html" class="btn-primary" data-i18n="menu.cv"></a>
            <a href="portfolio.html" class="btn-ghost">See my work →</a>
          </div>

        </div>
        <div class="home-img">
          <img src="assets/img/portada.png" alt="Marcos Varela" />
        </div>
      </div>
    </section>

    <section id="about-me" class="section-about reveal-below">
      <h2 data-i18n="index.aboutTitle"></h2>
      <div class="about-text">
        <p data-i18n="index.about1"></p>
        <p data-i18n="index.about2"></p>
        <p data-i18n="index.about3"></p>
      </div>
      <div class="about-photos">
        <img src="assets/img/happy.png" alt="Happy" />
        <img src="assets/img/picindex.jpeg" alt="" />
      </div>
    </section>
  </main>

  <footer></footer>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/scroll-reveal.js"></script>
  <script src="assets/js/typewriter.js"></script>
  <script src="assets/js/menumobile.js"></script>
  <script src="assets/js/lang.js"></script>
  <script src="assets/js/theme.js"></script>

  <script>
    // Rotating hero roles — reads from translations on langReady
    const roleEl = document.getElementById('heroRole');
    let current = 0;
    let roles = ['Software Engineer', 'C# · .NET', 'Industrial MES/ERP', 'WinForms · React'];
    let interval = null;

    function showRole() {
      roleEl.classList.remove('visible');
      setTimeout(() => {
        roleEl.textContent = roles[current];
        roleEl.classList.add('visible');
        current = (current + 1) % roles.length;
      }, 400);
    }

    function startRotator(newRoles) {
      if (newRoles) roles = newRoles;
      current = 0;
      clearInterval(interval);
      showRole();
      interval = setInterval(showRole, 2600);
    }

    // Start immediately with defaults, re-sync when lang loads
    startRotator();
    document.addEventListener('langReady', function (e) {
      const lang = e.detail && e.detail.lang;
      if (!lang) return;
      fetch('/assets/lang/translations.json')
        .then(r => r.json())
        .then(t => {
          const r = t[lang] && t[lang].index && t[lang].index.roles;
          if (r) startRotator(r);
        });
    });
  </script>
</body>

</html>
