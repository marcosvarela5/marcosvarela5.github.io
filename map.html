<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Map | Marcos Varela</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <header></header>

  <main>
    <h2 class="travel-map-title"><span data-i18n="index.visitedCountries"></span></h2>
    <div id="map" class="travel-map"></div>
  </main>

  <footer></footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const bounds = [[-90, -180], [90, 180]];
    const map = L.map('map', {
      center: [20, 0],
      zoom: 2,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0,
      worldCopyJump: false,
      minZoom: 2,
      maxZoom: 5,
      zoomControl: true
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      maxZoom: 19,
      noWrap: true
    }).addTo(map);

    const visitedCountries = ["ESP", "PRT", "GBR", "DEU", "AUT", "FRA"];

    function style(feature) {
      return {
        fillColor: visitedCountries.includes(feature.id) ? '#a6ff00' : '#ccc',
        weight: 1,
        color: 'white',
        fillOpacity: 0.7
      };
    }

    fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
      .then(res => res.json())
      .then(geojson => {
        L.geoJson(geojson, {
          style: style,
          onEachFeature: (feature, layer) => {
            if (visitedCountries.includes(feature.id)) {
              layer.bindPopup(feature.properties.ADMIN);
            }
          }
        }).addTo(map);
      });
  </script>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/scroll-reveal.js"></script>
  <script src="assets/js/menumobile.js"></script>
  <script src="assets/js/lang.js"></script>
  <script src="assets/js/theme.js"></script>
</body>

</html>
